name : print hello world
on :
  push :
    branches : 
      - test

jobs :
  printAA :
    runs-on : ubuntu-latest

    defaults :
      run :
        working-directory : backend

    steps :
      - name : repo clone
        uses : actions/checkout@v4
      - name : setup Node 
        uses : actions/setup-node@v4
        with :
            node-version : 18.x

      - name: print hi
        run : echo "Helloooo"

      - name: Run multiple commands
        run: |
          echo "Hello"
          date
          uname -a

      - name : Install dependencies
        run : npm ci

      - name : test 
        run : npm test













