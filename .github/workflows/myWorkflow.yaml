name: Print Hello World
on:
  push:
    branches:
      - action
jobs:
  print:
    runs-on: macOS-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4
        
      - name: Print Hello
        run: echo "Hello World"

      - name: Run multiple commands
        run: echo "Hello 123"


      - name: Install dependencies
        run: npm ci

      - name: Backend Test
        run: npm test
